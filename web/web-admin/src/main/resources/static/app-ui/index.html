<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转到用户端</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(180deg, #f4fbfa 0%, #edf3fb 100%);
            color: #142033;
        }

        .jump-card {
            width: min(560px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 24px 60px rgba(15, 118, 110, 0.12);
        }

        a {
            color: #0f766e;
        }
    </style>
</head>
<body>
<div class="jump-card">
    <h1>正在进入用户端</h1>
    <p>后台入口上的用户端地址会自动跳转到真实的用户前台服务，这样才能读取和后台一致的公寓、房间与个人数据。</p>
    <p>如果没有自动跳转，请先启动用户端服务，再访问：
        <a id="targetLink" href="http://localhost:8082/app-ui/index.html">http://localhost:8082/app-ui/index.html</a>
    </p>
</div>
<script>
    const target = `${window.location.protocol}//${window.location.hostname || "localhost"}:8082/app-ui/index.html`;
    document.getElementById("targetLink").href = target;
    document.getElementById("targetLink").textContent = target;
    window.location.replace(target);
</script>
</body>
</html>
